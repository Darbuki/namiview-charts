# Default values for namiview.
# Override with values-dev.yaml or values-prod.yaml.

replicaCount: 1

image:
  repository: darbuki/namiview-api
  tag: latest
  pullPolicy: IfNotPresent

revisionHistoryLimit: 3

# Application-level configuration
app:
  googleRedirectUri: "https://namiview.com/api/auth/callback"
  corsOrigins: "https://namiview.com"

  minio:
    endpoint: "minio.namiview-infra.svc.cluster.local:9000"

  mongo:
    hosts:
      - "mongo-mongodb-0.mongo-mongodb-headless.namiview-infra.svc.cluster.local:27017"
      - "mongo-mongodb-1.mongo-mongodb-headless.namiview-infra.svc.cluster.local:27017"
      - "mongo-mongodb-2.mongo-mongodb-headless.namiview-infra.svc.cluster.local:27017"
    replicaSet: "rs0"
    authSource: "admin"

# Service configuration
service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  sessionAffinity: ClientIP
  sessionAffinityTimeoutSeconds: 3600

# Vault / External Secrets configuration
vault:
  clusterSecretStore: vault-cluster-gateway
  refreshInterval: "1h"
  paths:
    mongodb: namiview/infra/mongodb/root
    mongodbDb: namiview/infra/mongodb/db
    minio: namiview/infra/minio/root
    minioBucket: namiview/infra/minio/bucket
    minioSecure: namiview/infra/minio/secure
    dockerReg: namiview/app/docker-reg
    googleCreds: namiview/app/google_creds.json
    jwt: namiview/app/jwt

# Prometheus metrics
metrics:
  enabled: true
  port: 9090
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s

# Grafana dashboard (auto-discovered via sidecar)
grafanaDashboard:
  enabled: true

# Network policy (disabled by default — enable in prod when ready)
networkPolicy:
  enabled: false

startupProbe:
  enabled: true
  httpGet:
    path: /api/health
    port: 8000
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  enabled: true
  httpGet:
    path: /api/health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /api/health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

PodDisruptionBudget:
  enabled: true
  minAvailable: 1