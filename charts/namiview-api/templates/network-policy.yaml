{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "namiview-api.fullname" . }}-netpol
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "namiview-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "namiview-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from Cloudflare Tunnel pods
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudflare
      ports:
        - protocol: TCP
          port: 80
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # MongoDB + MinIO (namiview-infra namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: namiview-infra
      ports:
        - protocol: TCP
          port: 27017
        - protocol: TCP
          port: 9000
    # Vault
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
      ports:
        - protocol: TCP
          port: 8200
    # External — Google OAuth
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
{{- end }}
