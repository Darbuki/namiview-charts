apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "namiview-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "namiview-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "namiview-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "namiview-api.selectorLabels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ include "namiview-api.dockercfgSecretName" . }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
            {{- end }}
          env:
            # ── MongoDB ────────────────────────────────────────────────────
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MONGO_USER
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MONGO_PASSWORD
            - name: MONGO_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MONGO_DB
            # MONGO_USER, MONGO_PASSWORD, MONGO_DB must be defined above
            # for Kubernetes $(VAR) interpolation to work here.
            - name: MONGO_URI
              value: {{ include "namiview-api.mongoUri" . | quote }}
            # ── MinIO ──────────────────────────────────────────────────────
            - name: MINIO_ENDPOINT
              value: {{ .Values.app.minio.endpoint | quote }}
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MINIO_BUCKET
            - name: MINIO_SECURE
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MINIO_SECURE