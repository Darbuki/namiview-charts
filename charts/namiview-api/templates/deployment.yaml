apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "namiview-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "namiview-api.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "namiview-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "namiview-api.selectorLabels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ include "namiview-api.dockercfgSecretName" . }}
      securityContext: 
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}                    
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.httpGet.path }}
              port: {{ .Values.startupProbe.httpGet.port }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}   
          readinessProbe:
            httpGet: 
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end}}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}            
          env:
            # ── MongoDB ────────────────────────────────────────────────────
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MONGO_USER
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MONGO_PASSWORD
            - name: MONGO_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MONGO_DB
            # MONGO_USER, MONGO_PASSWORD, MONGO_DB must be defined above
            # for Kubernetes $(VAR) interpolation to work here.
            - name: MONGO_URI
              value: {{ include "namiview-api.mongoUri" . | quote }}
            # ── MinIO ──────────────────────────────────────────────────────
            - name: MINIO_ENDPOINT
              value: {{ .Values.app.minio.endpoint | quote }}
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MINIO_BUCKET
            - name: MINIO_SECURE
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.connectionSecretName" . }}
                  key: MINIO_SECURE
            - name: GOOGLE_REDIRECT_URI
              value: {{ .Values.app.googleRedirectUri | quote }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/app/google_credentials.json"
            - name: CORS_ORIGINS
              value: {{ .Values.app.corsOrigins | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview-api.jwtSecretName" . }}
                  key: JWT_SECRET
          volumeMounts:
            - name: google-creds
              mountPath: "/app/google_credentials.json"
              subPath: "google_credentials.json"
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL            
      volumes:
        - name: google-creds
          secret:
            secretName: {{ include "namiview-api.googleCredsSecretName" . }}
            items:
              - key: "google-creds.json"
                path: "google_credentials.json"