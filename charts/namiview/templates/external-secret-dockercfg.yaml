apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "namiview.dockercfgSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "namiview.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.vault.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.vault.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "namiview.dockercfgSecretName" . }}
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: {{ .Values.vault.paths.dockerReg }}
        property: .dockerconfigjson
