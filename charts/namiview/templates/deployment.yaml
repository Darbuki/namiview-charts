apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "namiview.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "namiview.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "namiview.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "namiview.selectorLabels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ include "namiview.dockercfgSecretName" . }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8501
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
            {{- end }}
          env:
            # ── MongoDB ────────────────────────────────────────────────────
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview.connectionSecretName" . }}
                  key: MONGO_USER
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview.connectionSecretName" . }}
                  key: MONGO_PASSWORD
            - name: MONGO_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview.connectionSecretName" . }}
                  key: MONGO_DB
            # MONGO_USER, MONGO_PASSWORD, MONGO_DB must be defined above
            # for Kubernetes $(VAR) interpolation to work here.
            - name: MONGO_URI
              value: {{ include "namiview.mongoUri" . | quote }}
            # ── MinIO ──────────────────────────────────────────────────────
            - name: MINIO_ENDPOINT
              value: {{ .Values.app.minio.endpoint | quote }}
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview.connectionSecretName" . }}
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview.connectionSecretName" . }}
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview.connectionSecretName" . }}
                  key: MINIO_BUCKET
            - name: MINIO_SECURE
              valueFrom:
                secretKeyRef:
                  name: {{ include "namiview.connectionSecretName" . }}
                  key: MINIO_SECURE
            # ── Google Auth ────────────────────────────────────────────────
            - name: GOOGLE_REDIRECT_URI
              value: {{ .Values.app.googleRedirectUri | quote }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/app/google_credentials.json"
          volumeMounts:
            - name: google-creds
              mountPath: "/app/google_credentials.json"
              subPath: "google_credentials.json"
              readOnly: true
      volumes:
        - name: google-creds
          secret:
            secretName: {{ include "namiview.googleCredsSecretName" . }}
            items:
              - key: "google-creds.json"
                path: "google_credentials.json"
