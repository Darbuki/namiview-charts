# Default values for namiview.
# Override with values-dev.yaml or values-prod.yaml.

replicaCount: 1

image:
  repository: darbuki/namiview-ui
  tag: latest
  pullPolicy: IfNotPresent

revisionHistoryLimit: 3

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 80
  sessionAffinity: ClientIP
  sessionAffinityTimeoutSeconds: 3600

# Vault / External Secrets configuration
vault:
  clusterSecretStore: vault-cluster-gateway
  refreshInterval: "1h"
  paths:
    dockerReg: namiview/app/docker-reg

metrics:
  enabled: false

livenessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: 80
  periodSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: 80
  periodSeconds: 5
  failureThreshold: 3

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

PodDisruptionBudget:
  enabled: true